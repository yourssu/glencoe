name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/glencoe
            git pull origin main
            docker stop glenpractice-bot || true
            docker rm glenpractice-bot || true
            docker rmi glenpractice-bot || true
            docker build -t glenpractice-bot .
            docker run -d \
              --name glenpractice-bot \
              --restart always \
              -e SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }} \
              -e SLACK_APP_TOKEN=${{ secrets.SLACK_APP_TOKEN }} \
              glenpractice-bot
